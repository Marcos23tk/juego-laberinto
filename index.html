<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Laberinto Romántico</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #00CED1; /* Turquesa */
            color: #FF69B4; /* Rosa */
            text-align: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: clamp(24px, 5vw, 40px);
            margin: 10px 0;
        }
        #level {
            font-size: clamp(16px, 4vw, 24px);
            margin-bottom: 10px;
        }
        canvas {
            border: 3px solid #FF69B4; /* Rosa */
            background-color: #F0F8FF; /* Azul claro para contraste */
            display: block;
            margin: 10px auto;
            touch-action: none;
            max-width: 100%;
            height: auto;
            aspect-ratio: 1;
        }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }
        #message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #FF69B4; /* Rosa */
            color: #00CED1; /* Turquesa */
            padding: clamp(20px, 5vw, 50px);
            border-radius: 10px;
            font-size: clamp(20px, 5vw, 36px);
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            max-width: 90vw;
        }
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(10px, 2vw, 20px);
            margin-top: 20px;
            max-width: 250px;
            margin-left: auto;
            margin-right: auto;
        }
        button {
            width: clamp(50px, 15vw, 90px);
            height: clamp(50px, 15vw, 90px);
            font-size: clamp(18px, 6vw, 40px);
            background-color: #FF69B4;
            color: #00CED1;
            border: 2px solid #00CED1;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:active {
            background-color: #FF1493;
            transform: scale(0.95);
        }
        button:hover {
            background-color: #FF1493;
        }
        #upBtn {
            grid-column: 2;
            grid-row: 1;
        }
        #leftBtn {
            grid-column: 1;
            grid-row: 2;
        }
        #downBtn {
            grid-column: 2;
            grid-row: 2;
        }
        #rightBtn {
            grid-column: 3;
            grid-row: 2;
        }
        #instructions {
            font-size: clamp(12px, 3vw, 16px);
            margin-top: 10px;
            color: #333;
            background-color: rgba(255, 255, 255, 0.7);
            padding: clamp(8px, 2vw, 15px);
            border-radius: 5px;
            width: 100%;
            max-width: 95vw;
        }
        #responseButtons {
            display: flex;
            gap: clamp(10px, 3vw, 25px);
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .responseBtn {
            width: clamp(90px, 25vw, 150px);
            height: clamp(40px, 10vw, 60px);
            font-size: clamp(14px, 4vw, 20px);
            background-color: #00CED1;
            color: #FF69B4;
            border: 3px solid #FF69B4;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .responseBtn:hover {
            background-color: #FF69B4;
            color: #00CED1;
            transform: scale(1.05);
        }
        .responseBtn:active {
            transform: scale(0.95);
        }
        #finalMessage {
            font-size: clamp(24px, 6vw, 40px);
            margin-bottom: 20px;
            font-weight: bold;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9;
            display: none;
        }
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            h1 {
                margin: 5px 0;
            }
        }
    </style>
</head>

            let availableWidth = Math.min(screenWidth - 20, screenHeight - 200);

            playerSize = Math.floor(cellSize * 0.75);
            
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            canvas.style.width = canvasSize + 'px';
            canvas.style.height = canvasSize + 'px';

        function drawMaze() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < 20; y++) {
                for (let x = 0; x < 20; x++) {
                    if (mazes[currentLevel][y][x] === 1) {
                        ctx.fillStyle = '#FF69B4'; // Rosa para paredes
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            // Dibujar jugador
            ctx.fillStyle = '#FF1493'; // Rosa más oscuro para jugador
            ctx.fillRect(player.x * cellSize + 2.5, player.y * cellSize + 2.5, playerSize, playerSize);
            // Dibujar meta
            ctx.fillStyle = '#00CED1'; // Turquesa para meta
            ctx.fillRect(goal.x * cellSize + 2.5, goal.y * cellSize + 2.5, playerSize, playerSize);
        }

        function checkCollision(x, y) {
            return mazes[currentLevel][y][x] === 1;
        }

        function movePlayer(dx, dy) {
            const newX = player.x + dx;
            const newY = player.y + dy;
            if (newX >= 0 && newX < 20 && newY >= 0 && newY < 20 && !checkCollision(newX, newY)) {
                player.x = newX;
                player.y = newY;
                if (player.x === goal.x && player.y === goal.y) {
                    if (currentLevel < 4) {
                        currentLevel++;
                        levelDisplay.textContent = `Nivel: ${currentLevel + 1}`;
                        player = { x: 1, y: 1 };
                    } else {
                        message.style.display = 'block';
                    }
                }
                drawMaze();
            }
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                    movePlayer(1, 0);
                    break;
            }
        });

        // Botones de control táctil
        document.getElementById('upBtn').addEventListener('click', () => movePlayer(0, -1));
        document.getElementById('downBtn').addEventListener('click', () => movePlayer(0, 1));
        document.getElementById('leftBtn').addEventListener('click', () => movePlayer(-1, 0));
        document.getElementById('rightBtn').addEventListener('click', () => movePlayer(1, 0));

        // Detectar gestos de deslizamiento (swipe) en el canvas
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Determinar dirección del swipe (umbral mínimo de 30 píxeles)
            const threshold = 30;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Movimiento horizontal
                if (deltaX > threshold) {
                    movePlayer(1, 0); // Derecha
                } else if (deltaX < -threshold) {
                    movePlayer(-1, 0); // Izquierda
                }
            } else {
                // Movimiento vertical
                if (deltaY > threshold) {
                    movePlayer(0, 1); // Abajo
                } else if (deltaY < -threshold) {
                    movePlayer(0, -1); // Arriba
                }
            }
        });

        // Manejar respuestas de la pregunta
        document.getElementById('yesBtn').addEventListener('click', () => {
            const finalMessage = document.getElementById('finalMessage');
            finalMessage.textContent = '¡Claro que sí! 💕';
            finalMessage.style.color = '#00CED1';
            document.getElementById('responseButtons').style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
            message.style.display = 'block';
        });

        document.getElementById('noBtn').addEventListener('click', () => {
            const finalMessage = document.getElementById('finalMessage');
            finalMessage.textContent = 'Está bien... 💔';
            finalMessage.style.color = '#00CED1';
            document.getElementById('responseButtons').style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
            message.style.display = 'block';
        });

        // Dibujar el laberinto cuando el documento esté completamente cargado
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                resizeCanvas();
                drawMaze();
            });
        } else {
            resizeCanvas();
            drawMaze();
        }

        // Redimensionar cuando cambia el tamaño de la ventana
        window.addEventListener('resize', () => {
            resizeCanvas();
            drawMaze();
        });

        // Asegurar que se dibuje después de que todo esté cargado
        window.addEventListener('load', () => {
            setTimeout(() => {
                resizeCanvas();
                drawMaze();
            }, 100);
        });
    </script>
</body>
</html>
