<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal - Gestión de Fotocopiadoras</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Fotocopiadoras</h2>
                <p>Sistema de Gestión</p>
            </div>

            <ul class="sidebar-menu">
                <li class="sidebar-item">
                    <a href="/dashboard" class="menu-link">📊 Dashboard</a>
                </li>
                <li class="sidebar-item">
                    <a href="/equipos" class="menu-link">🖨️ Equipos</a>
                </li>
                <li class="sidebar-item">
                    <a href="/usuarios" class="menu-link">👥 Usuarios</a>
                </li>
                <li class="sidebar-item">
                    <a href="/sedes" class="menu-link">🏢 Sedes</a>
                </li>
                <li class="sidebar-item">
                    <a href="/personal" class="menu-link active">👨‍💼 Personal</a>
                </li>
                <li class="sidebar-item">
                    <a href="/marcas" class="menu-link">🏷️ Marcas</a>
                </li>
                <li class="sidebar-item">
                    <a href="/roles" class="menu-link">🔑 Roles</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1>Personal</h1>
            </div>

            <div class="content">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombres</th>
                            <th>Apellidos</th>
                            <th>Cargo</th>
                            <th>DNI</th>
                            <th>Sede</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="persona : ${personales}">
                            <td th:text="${persona.id}"></td>
                            <td th:text="${persona.nombres}"></td>
                            <td th:text="${persona.apellidos}"></td>
                            <td th:text="${persona.cargo}"></td>
                            <td th:text="${persona.dni}"></td>
                            <td th:text="${persona.sede.nombre}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
